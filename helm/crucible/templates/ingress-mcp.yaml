{{- if and .Values.mcp.enabled .Values.mcp.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "crucible.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
  annotations:
    # Required for SSE streaming — disable Nginx response buffering.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    {{- with .Values.mcp.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.mcp.ingress.className }}
  ingressClassName: {{ .Values.mcp.ingress.className }}
  {{- end }}
  {{- with .Values.mcp.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.mcp.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "crucible.fullname" $ }}-mcp
                port:
                  name: sse
          {{- end }}
    {{- end }}
{{- end }}
