{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crucible.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    {{- include "crucible.selectorLabels" (dict "root" . "component" "mcp-server") | nindent 4 }}
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  selector:
    matchLabels:
      {{- include "crucible.selectorLabels" (dict "root" . "component" "mcp-server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "crucible.labels" . | nindent 8 }}
        {{- include "crucible.selectorLabels" (dict "root" . "component" "mcp-server") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "crucible.serviceAccountName" . }}
      containers:
        - name: mcp-server
          image: {{ include "crucible.image" (dict "registry" (include "crucible.imageRegistry" .) "image" .Values.mcp.image) }}
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
          ports:
            - name: sse
              containerPort: {{ .Values.mcp.service.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: sse
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: sse
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: CRUCIBLE_API_URL
              value: "http://{{ include "crucible.fullname" . }}-control-plane:{{ .Values.controlPlane.service.port }}"
            - name: CRUCIBLE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "crucible.secretName" . }}
                  key: mcp-api-token
            - name: TRANSPORT
              value: "sse"
            - name: SSE_HOST
              value: "0.0.0.0"
            - name: SSE_PORT
              value: {{ .Values.mcp.service.port | quote }}
            - name: K6_PROMETHEUS_RW_URL
              value: {{ include "crucible.prometheusRwUrl" . | quote }}
          {{- with .Values.mcp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.mcp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
