apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
type: Opaque
stringData:
  # RabbitMQ
  rabbitmq-password: {{ .Values.rabbitmq.auth.password | quote }}

  # PostgreSQL
  postgres-password: {{ .Values.postgresql.auth.password | quote }}
  postgres-url: {{ printf "postgresql+asyncpg://%s:%s@%s:%d/%s"
    .Values.postgresql.auth.username
    .Values.postgresql.auth.password
    (include "crucible.postgresHost" .)
    (.Values.postgresql.service.port | int)
    .Values.postgresql.auth.database | quote }}

  # S3 / MinIO credentials (omitted when using IRSA on EKS)
  {{- if .Values.minio.enabled }}
  s3-access-key-id: {{ .Values.minio.auth.rootUser | quote }}
  s3-secret-access-key: {{ .Values.minio.auth.rootPassword | quote }}
  {{- else if .Values.s3.accessKeyId }}
  s3-access-key-id: {{ .Values.s3.accessKeyId | quote }}
  s3-secret-access-key: {{ .Values.s3.secretAccessKey | quote }}
  {{- end }}

  # Celery broker URL
  celery-broker-url: {{ printf "amqp://%s:%s@%s:%d//"
    .Values.rabbitmq.auth.username
    .Values.rabbitmq.auth.password
    (include "crucible.rabbitmqHost" .)
    (.Values.rabbitmq.service.amqpPort | int) | quote }}
