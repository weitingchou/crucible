name: crucible

services:

  # ── Control Plane ────────────────────────────────────────────────────────────
  control_plane:
    build:
      context: ..
      dockerfile: control_plane/Dockerfile
    ports:
      - "8000:8000"
    environment:
      CELERY_BROKER_URL: "amqp://guest:guest@rabbitmq:5672//"
      CELERY_RESULT_BACKEND: "rpc://"
      S3_BUCKET: "project-crucible-storage"
      AWS_REGION: "us-east-1"
      # Point boto3 at the local MinIO instance.
      AWS_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    environment:
      CELERY_BROKER_URL: "amqp://guest:guest@rabbitmq:5672//"
      CELERY_RESULT_BACKEND: "rpc://"
      S3_BUCKET: "project-crucible-storage"
      AWS_REGION: "us-east-1"
      AWS_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/crucible"
      PUSHGATEWAY_URL: "http://pushgateway:9091"
      # Resolved at runtime by the container scheduler; override for local dev.
      RUNNER_IP: "${RUNNER_IP:-127.0.0.1}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      pushgateway:
        condition: service_started

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    volumes:
      - ./config/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (Metadata / Lease Store) ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crucible
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (local S3) ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"    # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  # ── Prometheus Pushgateway ────────────────────────────────────────────────────
  pushgateway:
    image: prom/pushgateway:latest
    ports:
      - "9091:9091"

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # ── Apache Doris (local e2e testing only) ────────────────────────────────────
  # Start with: docker compose --profile doris up
  doris-fe:
    profiles: [doris]
    image: apache/doris:2.1.7-fe-x86_64
    hostname: doris-fe
    environment:
      FE_SERVERS: "fe1:doris-fe:9010"
      FE_ID: "1"
    ports:
      - "8030:8030"   # FE web UI
      - "9030:9030"   # MySQL-compatible query port
    volumes:
      - doris_fe_meta:/opt/apache-doris/fe/doris-meta
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/bootstrap | grep -q '\"code\":0'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  doris-be:
    profiles: [doris]
    image: apache/doris:2.1.7-be-x86_64
    hostname: doris-be
    environment:
      FE_SERVERS: "fe1:doris-fe:9010"
      BE_ADDR: "doris-be:9050"
    ports:
      - "8040:8040"   # BE web UI
      - "9060:9060"   # BE thrift RPC
    volumes:
      - doris_be_storage:/opt/apache-doris/be/storage
    depends_on:
      doris-fe:
        condition: service_healthy

  # Runs once to register the BE with the FE cluster.
  # Automatically exits after registration; restart: on-failure retries if FE
  # is not yet accepting connections.
  doris-init:
    profiles: [doris]
    image: mysql:8.0
    command: >
      bash -c "
        until mysql -h doris-fe -P 9030 -u root --connect-timeout=5 -e 'SELECT 1' >/dev/null 2>&1; do
          echo 'Waiting for Doris FE to accept connections...'; sleep 5;
        done;
        mysql -h doris-fe -P 9030 -u root -e \"ALTER SYSTEM ADD BACKEND 'doris-be:9050';\"
        echo 'Doris BE registered successfully.'
      "
    depends_on:
      doris-fe:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  minio_data:
  doris_fe_meta:
  doris_be_storage:
