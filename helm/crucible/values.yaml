# Default values for crucible.
# Override these in a separate values file (e.g. values-prod.yaml) for each environment.

# -- Your AWS account ID.  Used to auto-build the ECR image registry URL and
#    the IRSA role ARN.  Pass at install time:
#      helm install crucible ./helm/crucible --set awsAccountId=123456789012
awsAccountId: ""

# -- Global image registry prefix.  Leave empty to auto-build from awsAccountId
#    (e.g. <awsAccountId>.dkr.ecr.<region>.amazonaws.com).
#    Set explicitly to override (e.g. for a non-ECR registry).
imageRegistry: ""

# ── Service Account ───────────────────────────────────────────────────────────
# On EKS, annotate with eks.amazonaws.com/role-arn to use IRSA instead of
# static AWS credentials.  Leave accessKeyId/secretAccessKey empty when IRSA
# is in use — the AWS SDK will automatically pick up the projected token.
serviceAccount:
  create: true
  name: "crucible-service-account"
  # IRSA role name (without ARN prefix). The full ARN is auto-built from awsAccountId.
  irsaRoleName: "Crucible-S3-Role"

# ── Control Plane ────────────────────────────────────────────────────────────
controlPlane:
  image:
    repository: crucible/control-plane
    tag: latest
    pullPolicy: Always

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8000

  # Set type: LoadBalancer or configure ingress below to expose externally.
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: crucible.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources: {}
  #   requests:
  #     cpu: 250m
  #     memory: 256Mi
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Worker ───────────────────────────────────────────────────────────────────
worker:
  image:
    repository: crucible/worker
    tag: latest
    pullPolicy: Always

  replicaCount: 1

  resources: {}
  #   requests:
  #     cpu: 500m
  #     memory: 512Mi
  #   limits:
  #     cpu: 2
  #     memory: 2Gi

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── RabbitMQ ─────────────────────────────────────────────────────────────────
rabbitmq:
  enabled: true
  image:
    repository: rabbitmq
    tag: "3.13-management"
    pullPolicy: IfNotPresent

  auth:
    username: guest
    # Stored in Secret; override with a strong password in production.
    password: guest

  persistence:
    enabled: true
    storageClass: "gp3"
    size: 8Gi

  service:
    amqpPort: 5672
    managementPort: 15672

  resources: {}

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  auth:
    username: postgres
    # Stored in Secret; override with a strong password in production.
    password: postgres
    database: crucible

  persistence:
    enabled: true
    storageClass: "gp3"
    size: 10Gi

  service:
    port: 5432

  resources: {}

# ── MinIO ─────────────────────────────────────────────────────────────────────
# Set enabled: true to deploy MinIO as an in-cluster S3-compatible store.
# When enabled, endpointUrl overrides the S3 endpoint so services point at
# MinIO instead of AWS.  Leave endpointUrl empty to auto-build from service name.
minio:
  enabled: false
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent

  auth:
    rootUser: minioadmin
    # Stored in Secret; override with a strong password in production.
    rootPassword: minioadmin

  defaultBucket: project-crucible-storage

  # Custom endpoint URL for MinIO. Leave empty to auto-resolve from the
  # in-cluster service name (recommended). Only set this if you need to
  # override the auto-generated URL (e.g. for external MinIO instances).
  endpointUrl: ""

  persistence:
    enabled: true
    storageClass: "gp3"
    size: 50Gi

  service:
    s3Port: 9000
    consolePort: 9001

  resources: {}

# ── AWS S3 ────────────────────────────────────────────────────────────────────
# Used when minio.enabled is false.
# Leave accessKeyId/secretAccessKey empty when using IRSA on EKS — the AWS SDK
# will automatically pick up credentials from the pod's projected service account token.
s3:
  bucket: "claude-bot-workspace-project-crucible-storage"  # Required: your S3 bucket name
  region: ap-southeast-1   # AWS region where the bucket resides
  accessKeyId: ""          # Leave empty when using IRSA
  secretAccessKey: ""      # Leave empty when using IRSA

# ── MCP Server ───────────────────────────────────────────────────────────────
mcp:
  enabled: true
  image:
    repository: crucible/mcp
    tag: latest
    pullPolicy: Always

  replicaCount: 1

  # Bearer token for SSE authentication. Leave empty to disable auth.
  apiToken: ""

  service:
    type: ClusterIP
    port: 8001

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: crucible-mcp.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Chaos Engineering ─────────────────────────────────────────────────────────
# Chaos Mesh must be pre-installed on the target K8s cluster.
# This section controls RBAC for the worker to create/delete Chaos Mesh CRDs.
chaos:
  rbac:
    create: false  # Set true to create ClusterRole/Binding for Chaos Mesh CRDs

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: latest
    pullPolicy: IfNotPresent

  persistence:
    enabled: true
    storageClass: "gp3"
    size: 20Gi

  service:
    port: 9090

  resources: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}
