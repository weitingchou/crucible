apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crucible.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    {{- include "crucible.selectorLabels" (dict "root" . "component" "worker") | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "crucible.selectorLabels" (dict "root" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "crucible.labels" . | nindent 8 }}
        {{- include "crucible.selectorLabels" (dict "root" . "component" "worker") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "crucible.serviceAccountName" . }}
      containers:
        - name: worker
          image: {{ include "crucible.image" (dict "registry" (include "crucible.imageRegistry" .) "image" .Values.worker.image) }}
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          env:
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "crucible.secretName" . }}
                  key: celery-broker-url
            - name: CELERY_RESULT_BACKEND
              value: "rpc://"
            - name: S3_BUCKET
              value: {{ if .Values.minio.enabled }}{{ .Values.minio.defaultBucket | quote }}{{ else }}{{ .Values.s3.bucket | quote }}{{ end }}
            - name: AWS_REGION
              value: {{ .Values.s3.region | quote }}
            - name: AWS_ENDPOINT_URL
              value: {{ include "crucible.s3EndpointUrl" . | quote }}
            {{- if or .Values.minio.enabled .Values.s3.accessKeyId }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "crucible.secretName" . }}
                  key: s3-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "crucible.secretName" . }}
                  key: s3-secret-access-key
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "crucible.secretName" . }}
                  key: postgres-url
            {{- if .Values.prometheus.enabled }}
            - name: PROMETHEUS_RW_URL
              value: {{ include "crucible.prometheusRwUrl" . | quote }}
            {{- end }}
            # Inject pod IP for inter-node scaling coordination (waiting_room).
            - name: RUNNER_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
