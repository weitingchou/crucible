{{- if .Values.rabbitmq.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "crucible.fullname" . }}-rabbitmq
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    {{- include "crucible.selectorLabels" (dict "root" . "component" "rabbitmq") | nindent 4 }}
spec:
  serviceName: {{ include "crucible.fullname" . }}-rabbitmq
  replicas: 1
  selector:
    matchLabels:
      {{- include "crucible.selectorLabels" (dict "root" . "component" "rabbitmq") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "crucible.labels" . | nindent 8 }}
        {{- include "crucible.selectorLabels" (dict "root" . "component" "rabbitmq") | nindent 8 }}
    spec:
      volumes:
        - name: definitions
          secret:
            secretName: {{ include "crucible.secretName" . }}
            items:
              - key: rabbitmq-definitions.json
                path: rabbitmq-definitions.json
      containers:
        - name: rabbitmq
          image: {{ include "crucible.image" (dict "registry" "" "image" .Values.rabbitmq.image) }}
          imagePullPolicy: {{ .Values.rabbitmq.image.pullPolicy }}
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: {{ .Values.rabbitmq.auth.username | quote }}
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "crucible.secretName" . }}
                  key: rabbitmq-password
            - name: RABBITMQ_DEFAULT_DEFINITIONS_FILE
              value: /etc/rabbitmq/definitions/rabbitmq-definitions.json
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            {{- if .Values.rabbitmq.persistence.enabled }}
            - name: data
              mountPath: /var/lib/rabbitmq
            {{- end }}
            - name: definitions
              mountPath: /etc/rabbitmq/definitions
              readOnly: true
          {{- with .Values.rabbitmq.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  {{- if .Values.rabbitmq.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.rabbitmq.persistence.storageClass }}
        storageClassName: {{ .Values.rabbitmq.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.rabbitmq.persistence.size }}
  {{- end }}
{{- end }}
