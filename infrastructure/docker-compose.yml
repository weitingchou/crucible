name: crucible

services:

  # ── Control Plane ────────────────────────────────────────────────────────────
  control_plane:
    build:
      context: ..
      dockerfile: control_plane/Dockerfile
    ports:
      - "8000:8000"
    environment:
      CELERY_BROKER_URL: "amqp://guest:guest@rabbitmq:5672//"
      CELERY_RESULT_BACKEND: "rpc://"
      S3_BUCKET: "project-crucible-storage"
      AWS_REGION: "us-east-1"
      AWS_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    environment:
      CELERY_BROKER_URL: "amqp://guest:guest@rabbitmq:5672//"
      CELERY_RESULT_BACKEND: "rpc://"
      S3_BUCKET: "project-crucible-storage"
      AWS_REGION: "us-east-1"
      AWS_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/crucible"
      PROMETHEUS_RW_URL: "http://prometheus:9090/api/v1/write"
      # Resolved at runtime by the container scheduler; override for local dev.
      RUNNER_IP: "${RUNNER_IP:-127.0.0.1}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    volumes:
      - ./config/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (Metadata / Lease Store) ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crucible
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (local S3) ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"    # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init ─────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/project-crucible-storage
      "
    depends_on:
      minio:
        condition: service_healthy

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # ── MySQL (full e2e testing SUT) ──────────────────────────────────────────────
  # A lightweight MySQL instance used as the target database for full-pipeline
  # e2e tests.  These tests exercise the complete flow: submit plan → Celery
  # dispatch → k6 queries a real database → CSV collection → results API.
  #
  # Start with: ./tests/start_e2e_env.sh --full
  # Or manually: docker compose --profile e2e up -d mysql worker

  mysql:
    profiles: [e2e]
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: e2e_test
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql-init:
    profiles: [e2e]
    image: mysql:8.0
    entrypoint: >
      sh -c '
        until mysqladmin ping -h mysql -u root -proot --silent; do sleep 1; done &&
        mysql -h mysql -u root -proot e2e_test -e "
          CREATE TABLE IF NOT EXISTS test_data (id INT PRIMARY KEY, value VARCHAR(50));
          INSERT IGNORE INTO test_data VALUES (1, \"alpha\"), (2, \"beta\"), (3, \"gamma\");
        "
      '
    depends_on:
      mysql:
        condition: service_healthy

  # ── Apache Doris (local e2e testing only) ────────────────────────────────────
  # Start with: docker compose --profile doris up
  doris-fe:
    profiles: [doris]
    image: apache/doris:fe-2.1.7
    hostname: doris-fe
    entrypoint: >
      bash -c "
        IP=$$(hostname -i | awk '{print $$1}') &&
        SUBNET=$$(echo $$IP | awk -F. '{print $$1\".\"$$2\".\"$$3\".0/24\"}') &&
        echo \"priority_networks = $$SUBNET\" >> /opt/apache-doris/fe/conf/fe.conf &&
        export BUILD_TYPE=k8s &&
        bash /usr/local/bin/init_fe.sh
      "
    ports:
      - "8030:8030"   # FE web UI
      - "9030:9030"   # MySQL-compatible query port
    # No named volume — ephemeral meta dir ensures a clean BDB state on every
    # restart, avoiding BDB-JE UNKNOWN state from stale node identity.
    tmpfs:
      - /opt/apache-doris/fe/doris-meta
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/bootstrap | grep -q '\"code\":0'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  doris-be:
    profiles: [doris]
    image: apache/doris:be-2.1.7
    hostname: doris-be
    privileged: true
    entrypoint: >
      bash -c "
        sysctl -w vm.max_map_count=2000000 &&
        ln -sf /bin/true /usr/local/bin/swapon &&
        IP=$$(hostname -i | awk '{print $$1}') &&
        FE_IP=$$(getent hosts doris-fe | awk '{print $$1}') &&
        export FE_SERVERS=\"fe1:$$FE_IP:9010\" &&
        export BE_ADDR=\"$$IP:9050\" &&
        cd /usr/local/bin && exec bash entry_point.sh
      "
    ports:
      - "8040:8040"   # BE web UI
      - "9060:9060"   # BE thrift RPC
    tmpfs:
      - /opt/apache-doris/be/storage
    depends_on:
      doris-fe:
        condition: service_healthy

  # BE self-registers via entry_point.sh using its IP — no separate init container needed.

volumes:
  postgres_data:
  minio_data:
