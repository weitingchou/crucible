# Crucible end-to-end test plan — TPC-H on Apache Doris
#
# Prerequisites:
#   1. Run tests/setup_tpch_fixtures.py to generate and upload fixtures.
#   2. Ensure the eight TPC-H tables exist in your Doris database.
#   3. Upload this file to MinIO, then submit via:
#        curl -X POST http://localhost:8000/test-runs/plans/tpch_doris
#
# Fixture IDs match what setup_tpch_fixtures.py uploads at --scale 0.01.
# Adjust the fixture_id values if you used a different scale factor.

test_metadata:
  run_label: "tpch-doris-e2e"

test_environment:
  env_type: long-lived
  target_db: tpch
  component_spec:
    type: doris
    cluster_info:
      host: doris-fe:9030
      username: root
      password: ""
  observability:
    prometheus_sources:
      - name: engine
        url: "http://localhost:9090"
        metrics:
          - name: "cluster_qps"
            query: "sum(rate(doris_be_query_total{job='doris-be'}[1m]))"
          - name: "avg_memory"
            query: "avg(doris_be_mem_usage_bytes{job='doris-be'})"
  fixtures:
    - fixture_id: tpch-sf001-customer
      table: customer
    - fixture_id: tpch-sf001-lineitem
      table: lineitem
    - fixture_id: tpch-sf001-nation
      table: nation
    - fixture_id: tpch-sf001-orders
      table: orders
    - fixture_id: tpch-sf001-part
      table: part
    - fixture_id: tpch-sf001-partsupp
      table: partsupp
    - fixture_id: tpch-sf001-region
      table: region
    - fixture_id: tpch-sf001-supplier
      table: supplier

execution:
  executor: k6
  scaling_mode: intra_node
  concurrency: 10
  ramp_up: 30s
  hold_for: 2m
  workload:
    - workload_id: tpch-queries
